<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imposta Nuova Password - Studio Dentistico CGJ</title>
    <link rel="stylesheet" href="assets/css/bootstrap.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="reset-page">

    <main class="reset-container">
        <div class="reset-box">
            <h2 style="color: var(--primary-blue); margin-bottom: 10px;">Nuova Password</h2>
            <p style="color: var(--text-muted); margin-bottom: 25px; font-size: 0.9rem;">Scegli una nuova password sicura per il tuo account.</p>
            
            <form id="new-password-form">
                <input type="password" id="pwd1" class="reset-input" placeholder="Nuova password" required>
                <input type="password" id="pwd2" class="reset-input" placeholder="Conferma nuova password" required>
                <button type="submit" class="custom-btn custom-primary" style="width: 100%; margin-top: 10px;">Salva Password</button>
            </form>
            
            <p id="status-msg" style="margin-top: 15px; font-weight: bold; font-size: 0.9rem;"></p>
        </div>
    </main>

    <script src="assets/js/main.js"></script>
</body>
</html>
